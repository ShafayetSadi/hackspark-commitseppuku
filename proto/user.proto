syntax = "proto3";

package user;

service UserService {
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc Me(MeRequest) returns (UserResponse);
  rpc GetDiscount(DiscountRequest) returns (DiscountResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string full_name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message MeRequest {
  string user_id = 1;
}

message AuthResponse {
  string access_token = 1;
  string token_type = 2;
}

message UserResponse {
  int32 id = 1;
  string email = 2;
  string full_name = 3;
}

message DiscountRequest {
  int32 user_id = 1;
}

message DiscountResponse {
  int32 user_id = 1;
  int32 security_score = 2;
  int32 discount_percent = 3;
}
