syntax = "proto3";

package analytics;

service AnalyticsService {
  rpc GetTrends(TrendsRequest) returns (AnalyticsResponse);
  rpc GetSurge(SurgeRequest) returns (AnalyticsResponse);
  rpc GetRecommendations(RecommendationsRequest) returns (AnalyticsResponse);
  rpc GetPeakWindow(PeakWindowRequest) returns (AnalyticsResponse);
  rpc GetSurgeDays(SurgeDaysRequest) returns (AnalyticsResponse);
}

message TrendsRequest {
  string category = 1;
}

message SurgeRequest {
  string category = 1;
}

message RecommendationsRequest {
  string category = 1;
  int32 limit = 2;
  string date = 3;
}

message PeakWindowRequest {
  string from_month = 1;
  string to_month = 2;
}

message SurgeDaysRequest {
  string month = 1;
}

// JSON payload containing computed analytics
message AnalyticsResponse {
  string json_data = 1;
}
