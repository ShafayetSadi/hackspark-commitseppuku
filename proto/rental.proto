syntax = "proto3";

package rental;

service RentalService {
  rpc ListProducts(ProductsQuery) returns (ProductsResponse);
  rpc GetProduct(GetProductRequest) returns (ProductResponse);
  rpc GetAvailability(AvailabilityRequest) returns (AvailabilityResponse);
  rpc GetKthBusiestDate(KthBusiestDateRequest) returns (KthBusiestDateResponse);
  rpc GetUserTopCategories(UserTopCategoriesRequest) returns (UserTopCategoriesResponse);
  rpc GetLongestFreeStreak(LongestFreeStreakRequest) returns (LongestFreeStreakResponse);
  rpc GetMergedFeed(MergedFeedRequest) returns (MergedFeedResponse);
}

message ProductsQuery {
  string category = 1;
  string page = 2;
  string limit = 3;
  map<string, string> extra_params = 4;
}

message GetProductRequest {
  int32 product_id = 1;
}

// JSON payload forwarded verbatim from Central API
message ProductsResponse {
  string json_data = 1;
}

message ProductResponse {
  string json_data = 1;
}

message AvailabilityRequest {
  int32 product_id = 1;
  string from_date = 2;
  string to_date = 3;
}

message DateRange {
  string start = 1;
  string end = 2;
}

message AvailabilityResponse {
  int32 product_id = 1;
  string from_date = 2;
  string to_date = 3;
  bool available = 4;
  repeated DateRange busy_periods = 5;
  repeated DateRange free_windows = 6;
}

message KthBusiestDateRequest {
  string from_month = 1;
  string to_month = 2;
  int32 k = 3;
}

message KthBusiestDateResponse {
  string from_month = 1;
  string to_month = 2;
  int32 k = 3;
  string date = 4;
  int32 rental_count = 5;
}

message UserTopCategoriesRequest {
  int32 user_id = 1;
  int32 k = 2;
}

message CategoryCount {
  string category = 1;
  int32 rental_count = 2;
}

message UserTopCategoriesResponse {
  int32 user_id = 1;
  repeated CategoryCount top_categories = 2;
}

message LongestFreeStreakRequest {
  int32 product_id = 1;
  int32 year = 2;
}

message FreeStreak {
  string from_date = 1;
  string to_date = 2;
  int32 days = 3;
}

message LongestFreeStreakResponse {
  int32 product_id = 1;
  int32 year = 2;
  FreeStreak longest_free_streak = 3;
}

message MergedFeedRequest {
  repeated int32 product_ids = 1;
  int32 limit = 2;
}

message FeedRental {
  int32 rental_id = 1;
  int32 product_id = 2;
  string rental_start = 3;
  string rental_end = 4;
}

message MergedFeedResponse {
  repeated int32 product_ids = 1;
  int32 limit = 2;
  repeated FeedRental feed = 3;
}
