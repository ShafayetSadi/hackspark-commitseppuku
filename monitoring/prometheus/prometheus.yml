global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/hackspark-alerts.yml

scrape_configs:
  # If app services set METRICS_TOKEN, add auth to each protected job, for example:
  # authorization:
  #   type: Bearer
  #   credentials: ${METRICS_TOKEN}
  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:8000"]

  - job_name: item-service
    metrics_path: /metrics
    static_configs:
      - targets: ["item-service:8000"]

  - job_name: ai-agent-service
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-agent-service:8000"]

  - job_name: cadvisor
    metrics_path: /metrics
    static_configs:
      - targets: ["cadvisor:8080"]
