name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.29"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check (shared)
        run: uv run ty check shared

      - name: Type check (gateway)
        run: uv run --directory gateway ty check gateway

      - name: Type check (auth-service)
        run: uv run --directory services/auth_service ty check auth_service

      - name: Type check (ai-agent-service)
        run: uv run --directory services/ai_agent_service ty check ai_agent_service

      - name: Type check (item-service)
        run: uv run --directory services/item-service ty check app

      - name: Unit & integration tests
        run: uv run pytest tests -v --tb=short
