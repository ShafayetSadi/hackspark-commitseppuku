global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/hackspark-alerts.yml

scrape_configs:
  # If app services set METRICS_TOKEN, add auth to each protected job, for example:
  # authorization:
  #   type: Bearer
  #   credentials: ${METRICS_TOKEN}
  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: user-service
    metrics_path: /metrics
    static_configs:
      - targets: ["user-service:8001"]

  - job_name: rental-service
    metrics_path: /metrics
    static_configs:
      - targets: ["rental-service:8002"]

  - job_name: analytics-service
    metrics_path: /metrics
    static_configs:
      - targets: ["analytics-service:8003"]

  - job_name: agentic-service
    metrics_path: /metrics
    static_configs:
      - targets: ["agentic-service:8004"]

  - job_name: cadvisor
    metrics_path: /metrics
    static_configs:
      - targets: ["cadvisor:8080"]
