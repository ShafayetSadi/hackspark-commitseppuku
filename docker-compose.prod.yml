services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hackathon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hackathon}
      POSTGRES_DB: ${POSTGRES_DB:-hackathon}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-hackathon} -d ${POSTGRES_DB:-hackathon}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: prod
      DATABASE_BACKEND: postgresql
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-agent-service:
    build:
      context: .
      dockerfile: services/ai_agent_service/Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: prod
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  item-service:
    build:
      context: .
      dockerfile: services/item-service/Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: prod
      DATABASE_BACKEND: postgresql
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: prod
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8000}
      ITEM_SERVICE_URL: ${ITEM_SERVICE_URL:-http://item-service:8000}
      AI_AGENT_SERVICE_URL: ${AI_AGENT_SERVICE_URL:-http://ai-agent-service:8000}
    depends_on:
      auth-service:
        condition: service_healthy
      item-service:
        condition: service_healthy
      ai-agent-service:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      GATEWAY_URL: http://api-gateway:8000
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3001}:3000"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    depends_on:
      api-gateway:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      item-service:
        condition: service_healthy
      ai-agent-service:
        condition: service_healthy
      cadvisor:
        condition: service_started
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana-oss:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3000:3000"

  cadvisor:
    image: ghcr.io/google/cadvisor:0.56.2
    privileged: true
    command:
      - --docker_only=true
      - --housekeeping_interval=30s
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/run:/var/run:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
