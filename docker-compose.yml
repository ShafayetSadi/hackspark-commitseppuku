services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hackathon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hackathon}
      POSTGRES_DB: ${POSTGRES_DB:-hackathon}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hackathon} -d ${POSTGRES_DB:-hackathon}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7-jammy
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: dev
      DATABASE_BACKEND: postgresql
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      SERVICE_PORT: 8001
      GRPC_PORT: 50051
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/status')"]
      interval: 10s
      timeout: 5s
      retries: 12

  rental-service:
    build:
      context: .
      dockerfile: rental-service/Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: dev
      SERVICE_PORT: 8002
      GRPC_PORT: 50052
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/status')"]
      interval: 10s
      timeout: 5s
      retries: 12

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: dev
      SERVICE_PORT: 8003
      GRPC_PORT: 50053
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/status')"]
      interval: 10s
      timeout: 5s
      retries: 12

  agentic-service:
    build:
      context: .
      dockerfile: agentic-service/Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: dev
      SERVICE_PORT: 8004
      GRPC_PORT: 50054
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/status')"]
      interval: 10s
      timeout: 5s
      retries: 12

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: dev
      USER_SERVICE_ADDR: ${USER_SERVICE_ADDR:-user-service:50051}
      RENTAL_SERVICE_ADDR: ${RENTAL_SERVICE_ADDR:-rental-service:50052}
      ANALYTICS_SERVICE_ADDR: ${ANALYTICS_SERVICE_ADDR:-analytics-service:50053}
      AGENTIC_SERVICE_ADDR: ${AGENTIC_SERVICE_ADDR:-agentic-service:50054}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:8001}
      RENTAL_SERVICE_URL: ${RENTAL_SERVICE_URL:-http://rental-service:8002}
      ANALYTICS_SERVICE_URL: ${ANALYTICS_SERVICE_URL:-http://analytics-service:8003}
      AGENTIC_SERVICE_URL: ${AGENTIC_SERVICE_URL:-http://agentic-service:8004}
    depends_on:
      user-service:
        condition: service_healthy
      rental-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      agentic-service:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/status')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      GATEWAY_URL: http://api-gateway:8000
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/status').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  mongo_data:
